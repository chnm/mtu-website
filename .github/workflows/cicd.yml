name: "[mappingtheuniversity.rrchnm.org] Hugo Build, Release, Deploy"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:

  hugo-build-release-deploy:
    uses: chnm/.github/.github/workflows/hugo--build-release-deploy.yml@main
    secrets: inherit
    with:
      runner_labels: '["self-hosted","IncusOS"]'
      container-registry: "ghcr.io"
      container-image-name: "mtu-website"

      # This repo is a single Hugo site at the root (not a monorepo subdir),
      # so the build context is the repository root.
      hugo-context-root: "."
      hugo-devl-url: "https://mappingtheuniversity.rrchnm.org"
      hugo-prod-url: "https://mappingtheuniversity.rrchnm.org"

      # The Dockerfile serves the built site from Caddy's /srv (not nginx's
      # /usr/share/nginx/html/), so the reusable workflow must extract from /srv.
      hugo-content-path: "/srv/"

      build-artifact-name: "mtu-website"
      release-tag-name-type: "iso"
      tag-prefix: "mtu-"

      website-devl-fqdn: "mappingtheuniversity.rrchnm.org"
      website-prod-fqdn: "mappingtheuniversity.rrchnm.org"
