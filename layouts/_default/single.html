<!DOCTYPE html>
<html lang="en">
{{- partial "head.html" . -}}

<body class="w-full h-full">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {{- partial "header.html" . -}}
    <main id="main-content" class="container mx-auto px-4 py-24">
        <article class="md:container md:mx-auto px-4">
            <div class="medium-2 cell post-meta">
                {{with .Params.date}}
                <div class="date uppercase">{{.Format "2 Jan 2006"}}</div>
                {{end}}
            </div>
            <div class="post-content w-9/12">
                <h1>{{.Title}}</h1>
                {{.Content}}
            </div>
        </article>
    </main>
    {{- partial "footer.html" . -}}
</body>

</html>
