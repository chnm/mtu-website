<figure>
    {{ $image := .Get "image" }}
    {{ $alt_text := .Get "alt" }}
    {{ $id := .Get "id" }}

    <a href="#{{ $id }}" aria-label="View full size: {{ $alt_text }}">
        <img src="{{ $image }}" alt="{{ $alt_text }}"/>
    </a>
    
    <figcaption>
        <p>{{ .Get "caption" | markdownify }}</p>
    </figcaption>

    <a href="#" class="lightbox" id="{{ $id }}" aria-label="Close image">
        <img src="{{ $image }}" alt="{{ $alt_text }}">
    </a>
</figure>
